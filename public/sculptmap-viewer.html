  <body class="sculptmap-viewer fullscreen">
    <div class="w-100">
      <canvas id="preview-canvas" width="1024" height="768" title="Drag and rotate here.">Your browser does not support the canvas tag.</canvas>
    </div>
    <div id="sculptmap-container">
      <canvas id="sculptmap-canvas" width="64" height="64" style="max-width: 64px; max-height: 128px;"></canvas>
    </div>
    <div id="sculptmap-action-buttons" class="hidden">
      <button id="btn-export-stl">To STL</button>
    </div>
  </body>
  <style>
    body {
       display: flex;
    }
    .w-50 {
       width : 50%;
    }
    .left {
       position : relative;
       float : left;
    }
    .right {
       float : right;
    }
    #sculptmap-container {
      position: absolute;
      display: block;
      left: 10px;
      bottom: 10px;
      min-width: 64px;
      min-height: 64px;
      background: rgba(128,128,128,0.5);
